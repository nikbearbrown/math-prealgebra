<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-4-1 desc-4-1">
<title id="title-4-1">Cartesian coordinate plane with x and y axes labeled, origin marked,...</title>
<desc id="desc-4-1">A Cartesian coordinate plane with x and y axes labeled, origin marked, four quadrants labeled with Roman numerals I-IV, and four points plotted: (3, 5), (-2, 4), (-3, -1), (4, -2) — one in each quadrant. Pedagogical purpose: visualize the four quadrants and confirm that ordered pairs locate unique points.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Cartesian coordinate plane with x and y axes labeled, origin marked,...</text>
