<title id="title-2-1">Two number lines stacked vertically</title>
<desc id="desc-2-1">Two number lines stacked vertically. Top line: open circle at 4 with shading extending to the left, labeled "$x &lt; 4$" and "$(-\infty, 4)$". Bottom line: closed circle at 3 with shading extending to the left, labeled "$x \le 3$" and "$(-\infty, 3</desc>
