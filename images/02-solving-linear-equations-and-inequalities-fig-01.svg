<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">Two number lines stacked vertically. Top line: open circle at 4</tspan><tspan x="48" dy="15">with shading extending to the left, labeled "$x &lt; 4$" and</tspan><tspan x="48" dy="15">"$(-\infty, 4)$". Bottom line: closed circle at 3 with shading</tspan><tspan x="48" dy="15">extending to the left, labeled "$x \le 3$" and "$(-\infty, 3</tspan></text>
