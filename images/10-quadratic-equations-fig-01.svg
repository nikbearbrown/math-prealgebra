<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-10-1 desc-10-1">
<title id="title-10-1">parabola $y = x^2</title>
<desc id="desc-10-1">A parabola $y = x^2 - 4x + 3$ plotted on a coordinate plane, with axis of symmetry $x = 2$ shown as a dashed vertical line, vertex labeled at $(2, -1)$, x-intercepts marked at $(1, 0)$ and $(3, 0)$, y-intercept at $(0, 3)$, and the symmetric point $(4, 3)$ also marked. Pedagogical purpose: visualize how the algebraic features (vertex formula, intercepts, symmetry) place the parabola in the plane.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">parabola $y = x^2</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">A parabola $y = x^2 - 4x + 3$ plotted on a coordinate plane, with</tspan><tspan x="48" dy="15">axis of symmetry $x = 2$ shown as a dashed vertical line, vertex</tspan><tspan x="48" dy="15">labeled at $(2, -1)$, x-intercepts marked at $(1, 0)$ and $(3,</tspan><tspan x="48" dy="15">0)$, y-intercept at $(0, 3)$, and the symmetric point $(4, 3)$</tspan></text>
<rect x="116" y="104" width="468" height="248" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="0.75"/>
<line x1="350" y1="104" x2="350" y2="352" stroke="#2a1a0e" stroke-width="1"/>
<line x1="116" y1="228" x2="584" y2="228" stroke="#2a1a0e" stroke-width="1"/>
<circle cx="233" cy="166" r="34" fill="#C8102E" opacity="1"/>
<text x="233" y="170" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">parabola</text>
<circle cx="467" cy="166" r="34" fill="#1A3A5C" opacity="1"/>
<text x="467" y="170" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">plotted</text>
<circle cx="233" cy="290" r="34" fill="#6B3520" opacity="1"/>
<text x="233" y="294" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">coordinate</text>
<circle cx="467" cy="290" r="34" fill="#6B3520" opacity="0.75"/>
<text x="467" y="294" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">plane</text>
