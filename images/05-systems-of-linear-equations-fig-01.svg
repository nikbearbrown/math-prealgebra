<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-5-1 desc-5-1">
<title id="title-5-1">Three small coordinate planes side by side</title>
<desc id="desc-5-1">Three small coordinate planes side by side. Left plane shows two lines crossing at one point, labeled "(A) one solution — consistent, independent." Middle plane shows two parallel lines, labeled "(B) no solution — inconsistent." Right plane shows two identical lines (drawn as one), labeled "(C) infinitely many solutions — consistent, dependent." Pedagogical purpose: place the three outcomes side-by-side so the geometric distinction is visually unmistakable.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Three small coordinate planes side by side</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">Three small coordinate planes side by side. Left plane shows two</tspan><tspan x="48" dy="15">lines crossing at one point, labeled "(A) one solution —</tspan><tspan x="48" dy="15">consistent, independent." Middle plane shows two parallel lines,</tspan><tspan x="48" dy="15">labeled "(B) no solution — inconsistent." Right plane shows two</tspan></text>
<rect x="64" y="112" width="268" height="218" fill="#F5EFE8" stroke="#D4D4D4" stroke-width="1"/>
